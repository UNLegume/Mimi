selection:
  maxArticles: 3
  criteria:
    - novelty
    - impact
    - relevance

output:
  tone: "technical"
  language: "ja"

claude:
  model: "claude-sonnet-4-6"

grok:
  model: "grok-4-1-fast-non-reasoning"

notion:
  pipelineDatabaseId: "dc78a364-756f-4bf1-ad3d-8a5d20ea9913"
  pipelineDataSourceId: "05d1cb9c-d687-42f5-8f7a-6df5e882169b"
  pipelineDateDatabaseId: "a02fe3bf-ad17-48fa-943d-d0dc3297d970"
  pipelineDateDataSourceId: "a2d63311-373e-48d9-bd83-c08d36b2ff47"

pipeline:
  stages:
    - knowledge
    - summary
    - tweet
  summary:
    audiences:
      - name: "エンジニア"
        description: "AIツールを使う開発者。すぐ試せる情報を重視。"
        maxLength: 800
    rounds: 2
  tweet:
    maxChars: 280
    includeHashtags: true
    hashtagCount: 3

contentFetch:
  enabled: true
  timeoutMs: 15000
  maxLength: 10000
  skipDomains:
    - "twitter.com"
    - "x.com"
    - "bsky.app"
    - "threads.net"
    - "reddit.com"
